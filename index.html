<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huzaifah Hidayat</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #4facfe;
            color: white;
            font-size: 50px;
            font-weight: bold;
            line-height: 120px;
            margin: 0 auto 20px;
        }

        h1 {
            margin: 10px 0;
            color: #333;
        }

        p {
            color: #666;
        }

        .hobbies {
            margin: 20px 0;
        }

        .tag {
            display: inline-block;
            background: #4facfe;
            color: white;
            padding: 8px 14px;
            margin: 5px;
            border-radius: 20px;
        }

        .button {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 20px;
            background: #1877f2;
            color: white;
            text-decoration: none;
            border-radius: 10px;
        }

        .button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar">H</div>

        <h1>Huzaifah Hidayat</h1>

        <p><strong>About Me</strong></p>
        <p>I am just a simple man.</p>

        <div class="hobbies">
            <h3>My Hobbies</h3>
            <span class="tag">🎮 Online Games</span>
            <span class="tag">🕹️ Offline Games</span>
            <span class="tag">🎉 Anything Fun</span>
        </div>

        <a class="button" href="https://facebook.com/huzaifah" target="_blank">
            Facebook
        </a>
    </div>

</body>
</html>
